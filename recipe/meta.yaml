{% set name = "pytz" %}
{% set version = "2025.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/pytz-{{ version }}.tar.gz
  sha256: 360b9e3dbb49a209c21ad61809c7fb453643e048b38924c765813546746e81c3

build:
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation . -vv
  number: 0

requirements:
  host:
    - python
    - setuptools
    - wheel
    - pip
  run:
    - python

test:
  source_files:
    - pytz/tests
    - README.rst  # Required for some documentation tests
  imports:
    - pytz
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -vv pytz/tests
  requires:
    - pip
    - pytest

about:
  home: https://pythonhosted.org/pytz
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  license_family: MIT
  summary: World timezone definitions, modern and historical.
  description: |
    pytz brings the Olson tz database into Python. This library allows
    accurate and cross platform timezone calculations using Python 2.4 or
    higher. It also solves the issue of ambiguous times at the end of daylight
    saving time.
  doc_url: https://pythonhosted.org/pytz
  dev_url: https://github.com/stub42/pytz

extra:
  recipe-maintainers:
    - msarahan
    - ocefpaf
